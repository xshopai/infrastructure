name: Deploy App Service Infrastructure (Bicep)

# =============================================================================
# Declarative Infrastructure as Code using Azure Bicep
# Deploys all xShopAI infrastructure in 8-12 minutes (5-10x faster than bash)
#
# Uses subscription-scoped deployment - resource group is created via Bicep,
# not via CLI. This is the proper IaC approach.
#
# Authentication: Uses OIDC (OpenID Connect) - no secrets to rotate!
# Prerequisites:
# 1. Run scripts/setup-all.sh to set up Azure AD App + GitHub secrets
# 2. GitHub environments 'dev' and 'prod' must exist
#
# REQUIRED GitHub Organization Secrets (set by setup-all.sh):
# - AZURE_CLIENT_ID: Azure AD App client ID
# - AZURE_TENANT_ID: Azure AD tenant ID
# - AZURE_SUBSCRIPTION_ID: Azure subscription ID
#
# REQUIRED GitHub Organization Variables:
# - DEPLOY_SUFFIX_DEV: Suffix for dev environment (e.g., 'dev', 'as01')
# - DEPLOY_SUFFIX_PROD: Suffix for prod environment (e.g., 'prod', 'prod01')
#
# REQUIRED GitHub Repository Secrets (infrastructure repo only):
# - POSTGRES_ADMIN_PASSWORD, MYSQL_ADMIN_PASSWORD, SQL_ADMIN_PASSWORD
# - RABBITMQ_PASSWORD, JWT_SECRET
# - ADMIN_SERVICE_TOKEN, AUTH_SERVICE_TOKEN, USER_SERVICE_TOKEN
# - CART_SERVICE_TOKEN, ORDER_SERVICE_TOKEN, PRODUCT_SERVICE_TOKEN, WEB_BFF_TOKEN
#
# Setup: ./scripts/setup-all.sh
# =============================================================================

on:
  push:
    branches:
      - main
    paths:
      - "app-service/bicep/**"
      - "!.github/workflows/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
      suffix:
        description: "Resource suffix (leave blank to use org default)"
        required: false
        default: ""
      location:
        description: "Azure region"
        required: false
        type: string
        default: "francecentral"
      what_if_only:
        description: "Run what-if analysis only (no deployment)"
        required: false
        type: boolean
        default: false

env:
  BICEP_DIR: app-service/bicep

jobs:
  # ===========================================================================
  # Job 1: Validate Bicep Templates
  # ===========================================================================
  validate:
    name: Validate Bicep (${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }})
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    outputs:
      resource_group: ${{ steps.config.outputs.resource_group }}
      suffix: ${{ steps.config.outputs.suffix }}
      environment: ${{ steps.config.outputs.environment }}
      location: ${{ steps.config.outputs.location }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve configuration
        id: config
        run: |
          # Determine environment: manual input or default to 'dev' for push events
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
            INPUT_SUFFIX="${{ inputs.suffix }}"
            LOCATION="${{ inputs.location }}"
          else
            ENV="dev"
            INPUT_SUFFIX=""
            LOCATION="francecentral"
          fi

          # Resolve suffix priority: manual input > org variable > error
          if [ -n "$INPUT_SUFFIX" ]; then
            SUFFIX="$INPUT_SUFFIX"
            echo "📌 Using manual suffix: $SUFFIX"
          elif [ "$ENV" = "prod" ]; then
            SUFFIX="${{ vars.DEPLOY_SUFFIX_PROD }}"
            echo "📌 Using org prod suffix: $SUFFIX"
          else
            SUFFIX="${{ vars.DEPLOY_SUFFIX_DEV }}"
            echo "📌 Using org dev suffix: $SUFFIX"
          fi

          if [ -z "$SUFFIX" ]; then
            echo "::error::No suffix resolved. Set DEPLOY_SUFFIX_DEV / DEPLOY_SUFFIX_PROD org variables or pass the suffix input."
            exit 1
          fi

          RESOURCE_GROUP="rg-xshopai-${SUFFIX}"

          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "suffix=${SUFFIX}" >> $GITHUB_OUTPUT
          echo "resource_group=${RESOURCE_GROUP}" >> $GITHUB_OUTPUT
          echo "location=${LOCATION}" >> $GITHUB_OUTPUT

          echo ""
          echo "### Deployment Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment (approval gate) | \`${ENV}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Suffix (azure resources) | \`${SUFFIX}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Resource Group | \`${RESOURCE_GROUP}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Location | \`${LOCATION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "✓ Configuration resolved:"
          echo "  Environment: ${ENV}"
          echo "  Suffix: ${SUFFIX}"
          echo "  Resource Group: ${RESOURCE_GROUP}"
          echo "  Location: ${LOCATION}"

      - name: Upgrade Bicep CLI
        run: |
          az bicep upgrade
          az bicep version

      - name: Compile Bicep templates
        working-directory: ${{ env.BICEP_DIR }}
        run: |
          echo "Compiling deploy.bicep (subscription-scoped)..."
          az bicep build --file deploy.bicep
          echo "Compiling main.bicep (resource group-scoped)..."
          az bicep build --file main.bicep
          echo "✓ Compilation successful"

      - name: Validate deployment (subscription-scoped)
        working-directory: ${{ env.BICEP_DIR }}
        run: |
          echo "Validating Bicep deployment at subscription scope..."
          az deployment sub validate \
            --location ${{ steps.config.outputs.location }} \
            --template-file deploy.bicep \
            --parameters environment=${{ steps.config.outputs.environment }} \
            --parameters suffix=${{ steps.config.outputs.suffix }} \
            --parameters location=${{ steps.config.outputs.location }} \
            --parameters postgresAdminUser=pgadmin \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --parameters mysqlAdminUser=mysqladmin \
            --parameters mysqlAdminPassword="${{ secrets.MYSQL_ADMIN_PASSWORD }}" \
            --parameters sqlAdminUser=sqladmin \
            --parameters sqlAdminPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
            --parameters rabbitmqUser=admin \
            --parameters rabbitmqPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --parameters jwtSecret="${{ secrets.JWT_SECRET }}" \
            --parameters jwtAlgorithm=HS256 \
            --parameters jwtIssuer=auth-service \
            --parameters jwtAudience=xshopai-platform \
            --parameters jwtExpiresIn=24h \
            --parameters adminServiceToken="${{ secrets.ADMIN_SERVICE_TOKEN }}" \
            --parameters authServiceToken="${{ secrets.AUTH_SERVICE_TOKEN }}" \
            --parameters userServiceToken="${{ secrets.USER_SERVICE_TOKEN }}" \
            --parameters cartServiceToken="${{ secrets.CART_SERVICE_TOKEN }}" \
            --parameters orderServiceToken="${{ secrets.ORDER_SERVICE_TOKEN }}" \
            --parameters productServiceToken="${{ secrets.PRODUCT_SERVICE_TOKEN }}" \
            --parameters webBffToken="${{ secrets.WEB_BFF_TOKEN }}" \
            --output table
          echo "✓ Validation successful"

  # ===========================================================================
  # Job 2: What-If Analysis (Manual Dispatch Only)
  # ===========================================================================
  what-if:
    name: What-If Analysis (${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'

    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run what-if analysis (subscription-scoped)
        working-directory: ${{ env.BICEP_DIR }}
        run: |
          echo "### What-If Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.validate.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** ${{ needs.validate.outputs.resource_group }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          az deployment sub what-if \
            --location ${{ needs.validate.outputs.location }} \
            --template-file deploy.bicep \
            --parameters environment=${{ needs.validate.outputs.environment }} \
            --parameters suffix=${{ needs.validate.outputs.suffix }} \
            --parameters location=${{ needs.validate.outputs.location }} \
            --parameters postgresAdminUser=pgadmin \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --parameters mysqlAdminUser=mysqladmin \
            --parameters mysqlAdminPassword="${{ secrets.MYSQL_ADMIN_PASSWORD }}" \
            --parameters sqlAdminUser=sqladmin \
            --parameters sqlAdminPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
            --parameters rabbitmqUser=admin \
            --parameters rabbitmqPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --parameters jwtSecret="${{ secrets.JWT_SECRET }}" \
            --parameters jwtAlgorithm=HS256 \
            --parameters jwtIssuer=auth-service \
            --parameters jwtAudience=xshopai-platform \
            --parameters jwtExpiresIn=24h \
            --parameters adminServiceToken="${{ secrets.ADMIN_SERVICE_TOKEN }}" \
            --parameters authServiceToken="${{ secrets.AUTH_SERVICE_TOKEN }}" \
            --parameters userServiceToken="${{ secrets.USER_SERVICE_TOKEN }}" \
            --parameters cartServiceToken="${{ secrets.CART_SERVICE_TOKEN }}" \
            --parameters orderServiceToken="${{ secrets.ORDER_SERVICE_TOKEN }}" \
            --parameters productServiceToken="${{ secrets.PRODUCT_SERVICE_TOKEN }}" \
            --parameters webBffToken="${{ secrets.WEB_BFF_TOKEN }}" \
            --output table

          echo "✓ What-if analysis complete"

  # ===========================================================================
  # Job 3: Deploy Infrastructure
  # ===========================================================================
  deploy:
    name: Deploy Infrastructure (${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && !inputs.what_if_only && always() && needs.validate.result == 'success')

    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure (subscription-scoped)
        id: deploy
        working-directory: ${{ env.BICEP_DIR }}
        run: |
          echo "Deploying infrastructure (this takes 8-12 minutes)..."
          echo "Resource group will be created by Bicep: ${{ needs.validate.outputs.resource_group }}"

          DEPLOYMENT_NAME="xshopai-${{ needs.validate.outputs.environment }}-$(date +%Y%m%d-%H%M%S)"

          az deployment sub create \
            --name "$DEPLOYMENT_NAME" \
            --location ${{ needs.validate.outputs.location }} \
            --template-file deploy.bicep \
            --parameters environment=${{ needs.validate.outputs.environment }} \
            --parameters suffix=${{ needs.validate.outputs.suffix }} \
            --parameters location=${{ needs.validate.outputs.location }} \
            --parameters postgresAdminUser=pgadmin \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --parameters mysqlAdminUser=mysqladmin \
            --parameters mysqlAdminPassword="${{ secrets.MYSQL_ADMIN_PASSWORD }}" \
            --parameters sqlAdminUser=sqladmin \
            --parameters sqlAdminPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
            --parameters rabbitmqUser=admin \
            --parameters rabbitmqPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --parameters jwtSecret="${{ secrets.JWT_SECRET }}" \
            --parameters jwtAlgorithm=HS256 \
            --parameters jwtIssuer=auth-service \
            --parameters jwtAudience=xshopai-platform \
            --parameters jwtExpiresIn=24h \
            --parameters adminServiceToken="${{ secrets.ADMIN_SERVICE_TOKEN }}" \
            --parameters authServiceToken="${{ secrets.AUTH_SERVICE_TOKEN }}" \
            --parameters userServiceToken="${{ secrets.USER_SERVICE_TOKEN }}" \
            --parameters cartServiceToken="${{ secrets.CART_SERVICE_TOKEN }}" \
            --parameters orderServiceToken="${{ secrets.ORDER_SERVICE_TOKEN }}" \
            --parameters productServiceToken="${{ secrets.PRODUCT_SERVICE_TOKEN }}" \
            --parameters webBffToken="${{ secrets.WEB_BFF_TOKEN }}" \
            --output json

          echo "deployment_name=${DEPLOYMENT_NAME}" >> $GITHUB_OUTPUT
          echo "✓ Deployment complete"

      - name: Generate deployment summary
        run: |
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.validate.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** ${{ needs.validate.outputs.resource_group }}" >> $GITHUB_STEP_SUMMARY
          echo "**Location:** ${{ needs.validate.outputs.location }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment:** ${{ steps.deploy.outputs.deployment_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed At:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View in Azure Portal](https://portal.azure.com/#@/resource/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${{ needs.validate.outputs.resource_group }}/overview)" >> $GITHUB_STEP_SUMMARY

      - name: Tag Azure resources with deployment metadata
        run: |
          az tag create --resource-id "/subscriptions/$(az account show --query id -o tsv)/resourceGroups/${{ needs.validate.outputs.resource_group }}" \
            --tags \
              deployed-sha="${{ github.sha }}" \
              deployed-at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
              deployed-by="github-actions" \
              deployed-workflow="${{ github.workflow }}" \
              deployed-run-id="${{ github.run_id }}" || true
          echo "✓ Resource group tagged with deployment metadata"

  # ===========================================================================
  # Job 4: Verify Deployment
  # ===========================================================================
  verify:
    name: Verify Deployment (${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    if: ${{ !inputs.what_if_only }}

    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: List deployed resources
        run: |
          echo "Verifying deployed resources..."
          az resource list \
            --resource-group ${{ needs.validate.outputs.resource_group }} \
            --output table

          RESOURCE_COUNT=$(az resource list --resource-group ${{ needs.validate.outputs.resource_group }} --query 'length(@)')
          echo "✓ ${RESOURCE_COUNT} resources deployed"

      - name: Check App Service health
        run: |
          echo "Checking App Service status..."

          for svc in admin-service admin-ui audit-service auth-service cart-service chat-service customer-ui inventory-service notification-service order-processor-service order-service payment-service product-service review-service user-service web-bff; do
            APP="app-${svc}-xshopai-${{ needs.validate.outputs.environment }}-${{ needs.validate.outputs.suffix }}"
            STATE=$(az webapp show --name "$APP" --resource-group ${{ needs.validate.outputs.resource_group }} --query state -o tsv 2>/dev/null || echo "NotFound")
            echo "  ${svc}: ${STATE}"
          done

      - name: Verify Key Vault
        run: |
          KV="kv-xshopai-${{ needs.validate.outputs.environment }}-${{ needs.validate.outputs.suffix }}"
          SECRET_COUNT=$(az keyvault secret list --vault-name "$KV" --query 'length(@)' -o tsv 2>/dev/null || echo "0")
          echo "✓ Key Vault has ${SECRET_COUNT} secrets"

      - name: Generate verification report
        run: |
          echo "## ✅ Verification Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure deployment verified." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Deploy application code via service CI/CD pipelines" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify health endpoints after code deployment" >> $GITHUB_STEP_SUMMARY
