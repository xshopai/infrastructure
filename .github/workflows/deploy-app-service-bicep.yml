name: Deploy App Service Infrastructure (Bicep)

# =============================================================================
# Declarative Infrastructure as Code using Azure Bicep
# Deploys all xShopAI infrastructure in 8-12 minutes (5-10x faster than bash)
#
# Prerequisites:
# 1. AZURE_CREDENTIALS secret with service principal JSON
# 2. Service principal with Contributor + User Access Administrator roles
#
# REQUIRED GitHub Repository Secrets (go to Settings → Secrets and variables → Actions):
# - AZURE_CREDENTIALS: Azure service principal credentials (JSON)
# - POSTGRES_ADMIN_PASSWORD: PostgreSQL admin password (16+ chars, alphanumeric)
# - MYSQL_ADMIN_PASSWORD: MySQL admin password (16+ chars, alphanumeric)
# - SQL_ADMIN_PASSWORD: SQL Server admin password (16+ chars, mixed case + number + special)
# - RABBITMQ_PASSWORD: RabbitMQ admin password (16+ chars)
# - JWT_SECRET: JWT signing secret (64+ chars recommended)
# - ADMIN_SERVICE_TOKEN: Admin service API token (64 chars)
# - AUTH_SERVICE_TOKEN: Auth service API token (64 chars)
# - USER_SERVICE_TOKEN: User service API token (64 chars)
# - CART_SERVICE_TOKEN: Cart service API token (64 chars)
# - ORDER_SERVICE_TOKEN: Order service API token (64 chars)
# - PRODUCT_SERVICE_TOKEN: Product service API token (64 chars)
# - WEB_BFF_TOKEN: Web BFF API token (64 chars)
#
# To generate secrets, run: openssl rand -base64 48 | tr -dc 'A-Za-z0-9' | head -c 32
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
      suffix:
        description: "Resource suffix (e.g. as01, bicep)"
        required: true
        default: "bicep"
      location:
        description: "Azure region"
        required: false
        type: string
        default: "francecentral"
      what_if_only:
        description: "Run what-if analysis only (no deployment)"
        required: false
        type: boolean
        default: false

jobs:
  # ===========================================================================
  # Job 1: Validate Bicep Templates
  # ===========================================================================
  validate:
    name: Validate Bicep (${{ inputs.environment }})
    runs-on: ubuntu-latest

    outputs:
      resource_group: ${{ steps.config.outputs.resource_group }}
      suffix: ${{ steps.config.outputs.suffix }}
      environment: ${{ steps.config.outputs.environment }}
      location: ${{ steps.config.outputs.location }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve configuration
        id: config
        run: |
          ENV="${{ inputs.environment }}"
          SUFFIX="${{ inputs.suffix }}"
          RESOURCE_GROUP="rg-xshopai-${ENV}-${SUFFIX}"

          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "suffix=${SUFFIX}" >> $GITHUB_OUTPUT
          echo "resource_group=${RESOURCE_GROUP}" >> $GITHUB_OUTPUT
          echo "location=${{ inputs.location }}" >> $GITHUB_OUTPUT

          echo "✓ Configuration:"
          echo "  Environment: ${ENV}"
          echo "  Suffix: ${SUFFIX}"
          echo "  Resource Group: ${RESOURCE_GROUP}"
          echo "  Location: ${{ inputs.location }}"

      - name: Upgrade Bicep CLI
        run: |
          az bicep upgrade
          az bicep version

      - name: Compile Bicep template
        working-directory: app-service/bicep
        run: |
          echo "Compiling main.bicep..."
          az bicep build --file main.bicep
          echo "✓ Compilation successful"

      - name: Create resource group
        run: |
          echo "Creating resource group..."
          az group create \
            --name ${{ steps.config.outputs.resource_group }} \
            --location ${{ steps.config.outputs.location }} \
            --tags environment=${{ steps.config.outputs.environment }} deployment=bicep
          echo "✓ Resource group ready"

      - name: Validate deployment
        working-directory: app-service/bicep
        run: |
          echo "Validating Bicep deployment..."
          az deployment group validate \
            --resource-group ${{ steps.config.outputs.resource_group }} \
            --template-file main.bicep \
            --parameters suffix=${{ steps.config.outputs.suffix }} \
            --parameters location=${{ steps.config.outputs.location }} \
            --parameters postgresAdminUser=pgadmin \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --parameters mysqlAdminUser=mysqladmin \
            --parameters mysqlAdminPassword="${{ secrets.MYSQL_ADMIN_PASSWORD }}" \
            --parameters sqlAdminUser=sqladmin \
            --parameters sqlAdminPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
            --parameters rabbitmqUser=admin \
            --parameters rabbitmqPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --parameters jwtSecret="${{ secrets.JWT_SECRET }}" \
            --parameters jwtAlgorithm=HS256 \
            --parameters jwtIssuer=auth-service \
            --parameters jwtAudience=xshopai-platform \
            --parameters jwtExpiresIn=24h \
            --parameters adminServiceToken="${{ secrets.ADMIN_SERVICE_TOKEN }}" \
            --parameters authServiceToken="${{ secrets.AUTH_SERVICE_TOKEN }}" \
            --parameters userServiceToken="${{ secrets.USER_SERVICE_TOKEN }}" \
            --parameters cartServiceToken="${{ secrets.CART_SERVICE_TOKEN }}" \
            --parameters orderServiceToken="${{ secrets.ORDER_SERVICE_TOKEN }}" \
            --parameters productServiceToken="${{ secrets.PRODUCT_SERVICE_TOKEN }}" \
            --parameters webBffToken="${{ secrets.WEB_BFF_TOKEN }}" \
            --output table
          echo "✓ Validation successful"

  # ===========================================================================
  # Job 2: What-If Analysis
  # ===========================================================================
  what-if:
    name: What-If Analysis (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run what-if analysis
        working-directory: app-service/bicep
        run: |
          echo "### What-If Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.validate.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** ${{ needs.validate.outputs.resource_group }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          az deployment group what-if \
            --resource-group ${{ needs.validate.outputs.resource_group }} \
            --template-file main.bicep \
            --parameters suffix=${{ needs.validate.outputs.suffix }} \
            --parameters location=${{ needs.validate.outputs.location }} \
            --parameters postgresAdminUser=pgadmin \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --parameters mysqlAdminUser=mysqladmin \
            --parameters mysqlAdminPassword="${{ secrets.MYSQL_ADMIN_PASSWORD }}" \
            --parameters sqlAdminUser=sqladmin \
            --parameters sqlAdminPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
            --parameters rabbitmqUser=admin \
            --parameters rabbitmqPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --parameters jwtSecret="${{ secrets.JWT_SECRET }}" \
            --parameters jwtAlgorithm=HS256 \
            --parameters jwtIssuer=auth-service \
            --parameters jwtAudience=xshopai-platform \
            --parameters jwtExpiresIn=24h \
            --parameters adminServiceToken="${{ secrets.ADMIN_SERVICE_TOKEN }}" \
            --parameters authServiceToken="${{ secrets.AUTH_SERVICE_TOKEN }}" \
            --parameters userServiceToken="${{ secrets.USER_SERVICE_TOKEN }}" \
            --parameters cartServiceToken="${{ secrets.CART_SERVICE_TOKEN }}" \
            --parameters orderServiceToken="${{ secrets.ORDER_SERVICE_TOKEN }}" \
            --parameters productServiceToken="${{ secrets.PRODUCT_SERVICE_TOKEN }}" \
            --parameters webBffToken="${{ secrets.WEB_BFF_TOKEN }}" \
            --output table

          echo "✓ What-if analysis complete"

  # ===========================================================================
  # Job 3: Deploy Infrastructure
  # ===========================================================================
  deploy:
    name: Deploy Infrastructure (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [validate, what-if]
    if: ${{ !inputs.what_if_only }}

    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name ${{ needs.validate.outputs.resource_group }} \
            --location ${{ needs.validate.outputs.location }} \
            --tags project=xshopai environment=${{ needs.validate.outputs.environment }} managedBy=bicep \
            2>/dev/null || true
          echo "✓ Resource group ready"

      - name: Deploy Bicep infrastructure
        id: deploy
        working-directory: app-service/bicep
        run: |
          echo "Deploying infrastructure (this takes 8-12 minutes)..."
          DEPLOYMENT_NAME="bicep-deploy-$(date +%Y%m%d-%H%M%S)"

          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group ${{ needs.validate.outputs.resource_group }} \
            --template-file main.bicep \
            --parameters suffix=${{ needs.validate.outputs.suffix }} \
            --parameters location=${{ needs.validate.outputs.location }} \
            --parameters postgresAdminUser=pgadmin \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --parameters mysqlAdminUser=mysqladmin \
            --parameters mysqlAdminPassword="${{ secrets.MYSQL_ADMIN_PASSWORD }}" \
            --parameters sqlAdminUser=sqladmin \
            --parameters sqlAdminPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
            --parameters rabbitmqUser=admin \
            --parameters rabbitmqPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --parameters jwtSecret="${{ secrets.JWT_SECRET }}" \
            --parameters jwtAlgorithm=HS256 \
            --parameters jwtIssuer=auth-service \
            --parameters jwtAudience=xshopai-platform \
            --parameters jwtExpiresIn=24h \
            --parameters adminServiceToken="${{ secrets.ADMIN_SERVICE_TOKEN }}" \
            --parameters authServiceToken="${{ secrets.AUTH_SERVICE_TOKEN }}" \
            --parameters userServiceToken="${{ secrets.USER_SERVICE_TOKEN }}" \
            --parameters cartServiceToken="${{ secrets.CART_SERVICE_TOKEN }}" \
            --parameters orderServiceToken="${{ secrets.ORDER_SERVICE_TOKEN }}" \
            --parameters productServiceToken="${{ secrets.PRODUCT_SERVICE_TOKEN }}" \
            --parameters webBffToken="${{ secrets.WEB_BFF_TOKEN }}" \
            --output json

          echo "deployment_name=${DEPLOYMENT_NAME}" >> $GITHUB_OUTPUT
          echo "✓ Deployment complete"

      - name: Generate deployment summary
        run: |
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.validate.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** ${{ needs.validate.outputs.resource_group }}" >> $GITHUB_STEP_SUMMARY
          echo "**Location:** ${{ needs.validate.outputs.location }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View in Azure Portal](https://portal.azure.com/#@/resource/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${{ needs.validate.outputs.resource_group }}/overview)" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job 4: Verify Deployment
  # ===========================================================================
  verify:
    name: Verify Deployment (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    if: ${{ !inputs.what_if_only }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: List deployed resources
        run: |
          echo "Verifying deployed resources..."
          az resource list \
            --resource-group ${{ needs.validate.outputs.resource_group }} \
            --output table

          RESOURCE_COUNT=$(az resource list --resource-group ${{ needs.validate.outputs.resource_group }} --query 'length(@)')
          echo "✓ ${RESOURCE_COUNT} resources deployed"

      - name: Check App Service health
        run: |
          echo "Checking App Service status..."
          
          for svc in admin-service admin-ui audit-service auth-service cart-service chat-service customer-ui inventory-service notification-service order-processor-service order-service payment-service product-service review-service user-service web-bff; do
            APP="app-${svc}-xshopai-${{ needs.validate.outputs.environment }}-${{ needs.validate.outputs.suffix }}"
            STATE=$(az webapp show --name "$APP" --resource-group ${{ needs.validate.outputs.resource_group }} --query state -o tsv 2>/dev/null || echo "NotFound")
            echo "  ${svc}: ${STATE}"
          done

      - name: Verify Key Vault
        run: |
          KV="kv-xshopai-${{ needs.validate.outputs.environment }}-${{ needs.validate.outputs.suffix }}"
          SECRET_COUNT=$(az keyvault secret list --vault-name "$KV" --query 'length(@)' -o tsv 2>/dev/null || echo "0")
          echo "✓ Key Vault has ${SECRET_COUNT} secrets"

      - name: Generate verification report
        run: |
          echo "## ✅ Verification Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure deployment verified." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Deploy application code via service CI/CD pipelines" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify health endpoints after code deployment" >> $GITHUB_STEP_SUMMARY
