name: Deploy App Service Infrastructure (Bicep)

# =============================================================================
# Declarative Infrastructure as Code using Azure Bicep
# Deploys all xShopAI infrastructure in 8-12 minutes (5-10x faster than bash)
#
# Uses subscription-scoped deployment - resource group is created via Bicep,
# not via CLI. This is the proper IaC approach.
#
# Authentication: Uses OIDC (OpenID Connect) - no secrets to rotate!
# Prerequisites:
# 1. Run scripts/setup-all.sh to set up Azure AD App + GitHub secrets
# 2. GitHub environments 'dev' and 'prod' must exist
#
# REQUIRED GitHub Organization Secrets (set by setup-all.sh):
# - AZURE_CLIENT_ID: Azure AD App client ID
# - AZURE_TENANT_ID: Azure AD tenant ID
# - AZURE_SUBSCRIPTION_ID: Azure subscription ID
#
# REQUIRED GitHub Organization Variables:
# - DEPLOY_SUFFIX_DEV: Suffix for dev environment (e.g., 'dev', 'as01')
# - DEPLOY_SUFFIX_PROD: Suffix for prod environment (e.g., 'prod', 'prod01')
#
# OPTIONAL GitHub Organization Secrets:
# - GH_ORG_ADMIN_TOKEN: Fine-grained PAT with Organization Variables (read/write)
#   permission — enables auto-sync of PLAYWRIGHT_SERVICE_URL org variable
#   after deployment. Without it, run setup-github-secrets.sh to sync manually.
#
# REQUIRED GitHub Repository Secrets (infrastructure repo only):
# - POSTGRES_ADMIN_PASSWORD, MYSQL_ADMIN_PASSWORD, SQL_ADMIN_PASSWORD
# - RABBITMQ_PASSWORD, JWT_SECRET
# - ADMIN_SERVICE_TOKEN, AUTH_SERVICE_TOKEN, USER_SERVICE_TOKEN
# - CART_SERVICE_TOKEN, ORDER_SERVICE_TOKEN, PRODUCT_SERVICE_TOKEN, WEB_BFF_TOKEN
#
# Setup: ./scripts/setup-all.sh
# =============================================================================

on:
  push:
    branches:
      - main
    paths:
      - "app-service/bicep/**"
      - ".github/workflows/deploy-app-service-bicep.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
      suffix:
        description: "Resource suffix (leave blank to use org default)"
        required: false
        default: ""
      location:
        description: "Azure region"
        required: false
        type: string
        default: "francecentral"
      what_if_only:
        description: "Run what-if analysis only (no deployment)"
        required: false
        type: boolean
        default: false

env:
  BICEP_DIR: app-service/bicep

jobs:
  # ===========================================================================
  # Job 1: Validate Bicep Templates
  # ===========================================================================
  validate:
    name: Validate Bicep (${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }})
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    outputs:
      resource_group: ${{ steps.config.outputs.resource_group }}
      suffix: ${{ steps.config.outputs.suffix }}
      environment: ${{ steps.config.outputs.environment }}
      location: ${{ steps.config.outputs.location }}
      object_id: ${{ steps.get-object-id.outputs.object_id }}
      github_actions_principal_id: ${{ steps.get-oidc-principal.outputs.principal_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve configuration
        id: config
        run: |
          # Determine environment: manual input or default to 'dev' for push events
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
            INPUT_SUFFIX="${{ inputs.suffix }}"
            LOCATION="${{ inputs.location }}"
          else
            ENV="dev"
            INPUT_SUFFIX=""
            LOCATION="francecentral"
          fi

          # Resolve suffix priority: manual input > org variable > error
          if [ -n "$INPUT_SUFFIX" ]; then
            SUFFIX="$INPUT_SUFFIX"
            echo "📌 Using manual suffix: $SUFFIX"
          elif [ "$ENV" = "prod" ]; then
            SUFFIX="${{ vars.DEPLOY_SUFFIX_PROD }}"
            echo "📌 Using org prod suffix: $SUFFIX"
          else
            SUFFIX="${{ vars.DEPLOY_SUFFIX_DEV }}"
            echo "📌 Using org dev suffix: $SUFFIX"
          fi

          if [ -z "$SUFFIX" ]; then
            echo "::error::No suffix resolved. Set DEPLOY_SUFFIX_DEV / DEPLOY_SUFFIX_PROD org variables or pass the suffix input."
            exit 1
          fi

          RESOURCE_GROUP="rg-xshopai-${SUFFIX}"

          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "suffix=${SUFFIX}" >> $GITHUB_OUTPUT
          echo "resource_group=${RESOURCE_GROUP}" >> $GITHUB_OUTPUT
          echo "location=${LOCATION}" >> $GITHUB_OUTPUT

          echo ""
          echo "### Deployment Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment (approval gate) | \`${ENV}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Suffix (azure resources) | \`${SUFFIX}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Resource Group | \`${RESOURCE_GROUP}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Location | \`${LOCATION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "✓ Configuration resolved:"
          echo "  Environment: ${ENV}"
          echo "  Suffix: ${SUFFIX}"
          echo "  Resource Group: ${RESOURCE_GROUP}"
          echo "  Location: ${LOCATION}"

      - name: Upgrade Bicep CLI
        run: |
          az bicep upgrade
          az bicep version

      - name: Get admin user Object ID for Key Vault access
        id: get-object-id
        run: |
          # Try to get Object ID from secrets, fallback to signed-in user
          if [ -n "${{ secrets.KEYVAULT_ADMIN_OBJECT_ID }}" ]; then
            OBJECT_ID="${{ secrets.KEYVAULT_ADMIN_OBJECT_ID }}"
            echo "Using Object ID from secret: ${OBJECT_ID}"
          else
            # For local testing, get currently signed-in user
            OBJECT_ID=$(az ad signed-in-user show --query id -o tsv 2>/dev/null || echo "")
            if [ -z "$OBJECT_ID" ]; then
              echo "⚠️  No Key Vault admin Object ID configured - skipping RBAC assignment"
              echo "   To grant yourself access, add KEYVAULT_ADMIN_OBJECT_ID secret with your Azure AD Object ID"
            else
              echo "Using currently authenticated principal: ${OBJECT_ID}"
            fi
          fi
          echo "object_id=${OBJECT_ID}" >> $GITHUB_OUTPUT

      - name: Get GitHub Actions OIDC service principal ID
        id: get-oidc-principal
        run: |
          # Look up the service principal object ID from the OIDC app registration client ID
          PRINCIPAL_ID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv 2>/dev/null || echo "")
          if [ -z "$PRINCIPAL_ID" ]; then
            echo "⚠️  Could not resolve OIDC service principal — Playwright storage role assignment will be skipped"
          else
            echo "Using OIDC service principal: ${PRINCIPAL_ID}"
          fi
          echo "principal_id=${PRINCIPAL_ID}" >> $GITHUB_OUTPUT

      - name: Compile Bicep templates
        working-directory: ${{ env.BICEP_DIR }}
        run: |
          echo "Compiling deploy.bicep (subscription-scoped)..."
          az bicep build --file deploy.bicep
          echo "Compiling main.bicep (resource group-scoped)..."
          az bicep build --file main.bicep
          echo "✓ Compilation successful"

      - name: Validate deployment (subscription-scoped)
        working-directory: ${{ env.BICEP_DIR }}
        run: |
          echo "Validating Bicep deployment at subscription scope..."
          az deployment sub validate \
            --location ${{ steps.config.outputs.location }} \
            --template-file deploy.bicep \
            --parameters environment=${{ steps.config.outputs.environment }} \
            --parameters suffix=${{ steps.config.outputs.suffix }} \
            --parameters location=${{ steps.config.outputs.location }} \
            --parameters postgresAdminUser=pgadmin \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --parameters mysqlAdminUser=mysqladmin \
            --parameters mysqlAdminPassword="${{ secrets.MYSQL_ADMIN_PASSWORD }}" \
            --parameters sqlAdminUser=sqladmin \
            --parameters sqlAdminPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
            --parameters rabbitmqUser=admin \
            --parameters rabbitmqPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --parameters jwtSecret="${{ secrets.JWT_SECRET }}" \
            --parameters jwtAlgorithm=HS256 \
            --parameters jwtIssuer=auth-service \
            --parameters jwtAudience=xshopai-platform \
            --parameters jwtExpiresIn=24h \
            --parameters adminServiceToken="${{ secrets.ADMIN_SERVICE_TOKEN }}" \
            --parameters authServiceToken="${{ secrets.AUTH_SERVICE_TOKEN }}" \
            --parameters userServiceToken="${{ secrets.USER_SERVICE_TOKEN }}" \
            --parameters cartServiceToken="${{ secrets.CART_SERVICE_TOKEN }}" \
            --parameters orderServiceToken="${{ secrets.ORDER_SERVICE_TOKEN }}" \
            --parameters productServiceToken="${{ secrets.PRODUCT_SERVICE_TOKEN }}" \
            --parameters webBffToken="${{ secrets.WEB_BFF_TOKEN }}" \
            --parameters keyVaultAdminObjectId="${{ steps.get-object-id.outputs.object_id }}" \
            --parameters githubActionsPrincipalId="${{ steps.get-oidc-principal.outputs.principal_id }}" \
            --output table
          echo "✓ Validation successful"

  # ===========================================================================
  # Job 2: What-If Analysis (Manual Dispatch Only)
  # ===========================================================================
  what-if:
    name: What-If Analysis (${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'

    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run what-if analysis (subscription-scoped)
        working-directory: ${{ env.BICEP_DIR }}
        run: |
          echo "### What-If Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.validate.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** ${{ needs.validate.outputs.resource_group }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          az deployment sub what-if \
            --location ${{ needs.validate.outputs.location }} \
            --template-file deploy.bicep \
            --parameters environment=${{ needs.validate.outputs.environment }} \
            --parameters suffix=${{ needs.validate.outputs.suffix }} \
            --parameters location=${{ needs.validate.outputs.location }} \
            --parameters postgresAdminUser=pgadmin \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --parameters mysqlAdminUser=mysqladmin \
            --parameters mysqlAdminPassword="${{ secrets.MYSQL_ADMIN_PASSWORD }}" \
            --parameters sqlAdminUser=sqladmin \
            --parameters sqlAdminPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
            --parameters rabbitmqUser=admin \
            --parameters rabbitmqPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --parameters jwtSecret="${{ secrets.JWT_SECRET }}" \
            --parameters jwtAlgorithm=HS256 \
            --parameters jwtIssuer=auth-service \
            --parameters jwtAudience=xshopai-platform \
            --parameters jwtExpiresIn=24h \
            --parameters adminServiceToken="${{ secrets.ADMIN_SERVICE_TOKEN }}" \
            --parameters authServiceToken="${{ secrets.AUTH_SERVICE_TOKEN }}" \
            --parameters userServiceToken="${{ secrets.USER_SERVICE_TOKEN }}" \
            --parameters cartServiceToken="${{ secrets.CART_SERVICE_TOKEN }}" \
            --parameters orderServiceToken="${{ secrets.ORDER_SERVICE_TOKEN }}" \
            --parameters productServiceToken="${{ secrets.PRODUCT_SERVICE_TOKEN }}" \
            --parameters webBffToken="${{ secrets.WEB_BFF_TOKEN }}" \
            --parameters keyVaultAdminObjectId="${{ needs.validate.outputs.object_id }}" \
            --parameters githubActionsPrincipalId="${{ needs.validate.outputs.github_actions_principal_id }}" \
            --output table

          echo "✓ What-if analysis complete"

  # ===========================================================================
  # Job 3: Deploy Infrastructure
  # ===========================================================================
  deploy:
    name: Deploy Infrastructure (${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && !inputs.what_if_only && always() && needs.validate.result == 'success')

    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -------------------------------------------------------------------------
      # Start stopped database servers before Bicep runs.
      # Azure rejects any update (SKU, config, passwords) on a stopped flexible
      # server with UpsertServerManagementOperationUnsupportedForStoppedServer /
      # OperationNotAllowedForNonSucceededServer.  We must bring them to Ready
      # state first; otherwise the incremental deployment always fails.
      # -------------------------------------------------------------------------
      - name: Start stopped database servers
        run: |
          RG="${{ needs.validate.outputs.resource_group }}"
          SUFFIX="${{ needs.validate.outputs.suffix }}"

          # Only attempt if the resource group already exists
          if ! az group show --name "$RG" &>/dev/null; then
            echo "Resource group $RG does not exist yet — skipping server start (first deploy)"
            exit 0
          fi

          start_postgres() {
            local SERVER="psql-xshopai-${SUFFIX}"
            local STATE
            STATE=$(az postgres flexible-server show \
              --name "$SERVER" --resource-group "$RG" \
              --query "state" -o tsv 2>/dev/null || echo "NotFound")

            echo "PostgreSQL '$SERVER' state: $STATE"
            if [[ "$STATE" == "Stopped" ]]; then
              echo "  → Starting PostgreSQL flexible server..."
              az postgres flexible-server start \
                --name "$SERVER" --resource-group "$RG" --no-wait
              echo "  → Start command issued (--no-wait). Will wait below."
            fi
          }

          start_mysql() {
            local SERVER="mysql-xshopai-${SUFFIX}"
            local STATE
            STATE=$(az mysql flexible-server show \
              --name "$SERVER" --resource-group "$RG" \
              --query "state" -o tsv 2>/dev/null || echo "NotFound")

            echo "MySQL '$SERVER' state: $STATE"
            if [[ "$STATE" == "Stopped" ]]; then
              echo "  → Starting MySQL flexible server..."
              az mysql flexible-server start \
                --name "$SERVER" --resource-group "$RG" --no-wait
              echo "  → Start command issued (--no-wait). Will wait below."
            fi
          }

          wait_for_server() {
            local TYPE="$1"   # postgres | mysql
            local SERVER="$2"
            local MAX_WAIT=600   # 10 minutes
            local ELAPSED=0
            local INTERVAL=20

            echo "Waiting for $TYPE '$SERVER' to reach Ready state..."
            while true; do
              if [[ "$TYPE" == "postgres" ]]; then
                STATE=$(az postgres flexible-server show \
                  --name "$SERVER" --resource-group "$RG" \
                  --query "state" -o tsv 2>/dev/null || echo "Unknown")
              else
                STATE=$(az mysql flexible-server show \
                  --name "$SERVER" --resource-group "$RG" \
                  --query "state" -o tsv 2>/dev/null || echo "Unknown")
              fi

              echo "  $SERVER — $STATE (${ELAPSED}s elapsed)"
              if [[ "$STATE" == "Ready" ]]; then
                echo "  ✓ $SERVER is Ready"
                return 0
              fi
              if [[ $ELAPSED -ge $MAX_WAIT ]]; then
                echo "::error::Timed out waiting for $SERVER to reach Ready state (last state: $STATE)"
                return 1
              fi
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done
          }

          # Issue start commands in parallel
          start_postgres &
          start_mysql &
          wait

          # Wait for both to be Ready before Bicep runs
          PG_SERVER="psql-xshopai-${SUFFIX}"
          MY_SERVER="mysql-xshopai-${SUFFIX}"

          PG_STATE=$(az postgres flexible-server show \
            --name "$PG_SERVER" --resource-group "$RG" \
            --query "state" -o tsv 2>/dev/null || echo "NotFound")
          MY_STATE=$(az mysql flexible-server show \
            --name "$MY_SERVER" --resource-group "$RG" \
            --query "state" -o tsv 2>/dev/null || echo "NotFound")

          [[ "$PG_STATE" != "NotFound" && "$PG_STATE" != "Ready" ]] && \
            wait_for_server postgres "$PG_SERVER"
          [[ "$MY_STATE" != "NotFound" && "$MY_STATE" != "Ready" ]] && \
            wait_for_server mysql "$MY_SERVER"

          echo "✓ All database servers are in Ready state — proceeding with Bicep deployment"

      # -----------------------------------------------------------------
      # Clean up stale role assignments before Bicep runs.
      # Role assignments are immutable — if a managed identity was
      # regenerated (app service recreated), the old assignment blocks
      # creation of a new one with the same deterministic GUID name.
      # Deleting stale assignments lets Bicep create fresh ones.
      # -----------------------------------------------------------------
      - name: Clean up stale role assignments
        run: |
          RG="${{ needs.validate.outputs.resource_group }}"
          SUFFIX="${{ needs.validate.outputs.suffix }}"

          if ! az group show --name "$RG" &>/dev/null; then
            echo "Resource group $RG does not exist yet — skipping (first deploy)"
            exit 0
          fi

          KV_NAME="kv-xshopai-${SUFFIX}"
          SUB_ID=$(az account show --query id -o tsv)

          # Key Vault Secrets User role on the Key Vault (for cart-service)
          KV_SCOPE="/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.KeyVault/vaults/${KV_NAME}"
          echo "Checking Key Vault role assignments at: $KV_NAME"
          STALE_KV=$(az role assignment list \
            --scope "$KV_SCOPE" \
            --role "Key Vault Secrets User" \
            --query "[].id" -o tsv 2>/dev/null || true)
          if [ -n "$STALE_KV" ]; then
            echo "  Deleting $(echo "$STALE_KV" | wc -l) Key Vault Secrets User assignment(s)..."
            echo "$STALE_KV" | while read -r ID; do
              az role assignment delete --ids "$ID" 2>/dev/null || true
            done
            echo "  ✓ Cleaned up"
          else
            echo "  No stale Key Vault role assignments found"
          fi

          # Cognitive Services OpenAI User role on the resource group (for chat-service)
          RG_SCOPE="/subscriptions/${SUB_ID}/resourceGroups/${RG}"
          echo "Checking OpenAI role assignments at: $RG"
          STALE_OAI=$(az role assignment list \
            --scope "$RG_SCOPE" \
            --role "Cognitive Services OpenAI User" \
            --query "[].id" -o tsv 2>/dev/null || true)
          if [ -n "$STALE_OAI" ]; then
            echo "  Deleting $(echo "$STALE_OAI" | wc -l) Cognitive Services OpenAI User assignment(s)..."
            echo "$STALE_OAI" | while read -r ID; do
              az role assignment delete --ids "$ID" 2>/dev/null || true
            done
            echo "  ✓ Cleaned up"
          else
            echo "  No stale OpenAI role assignments found"
          fi

          echo "✓ Role assignment cleanup complete"

      - name: Deploy infrastructure (subscription-scoped)
        id: deploy
        working-directory: ${{ env.BICEP_DIR }}
        run: |
          echo "Deploying infrastructure (this takes 8-12 minutes)..."
          echo "Resource group will be created by Bicep: ${{ needs.validate.outputs.resource_group }}"
          echo "Deployment mode: Incremental (updates existing resources, creates new ones)"

          DEPLOYMENT_NAME="xshopai-${{ needs.validate.outputs.environment }}-$(date +%Y%m%d-%H%M%S)"

          # Deploy with incremental mode (explicit for clarity)
          # - Creates new resources
          # - Updates existing resources if configuration changed
          # - Leaves unchanged resources as-is
          # - Does NOT delete resources not in template
          az deployment sub create \
            --name "$DEPLOYMENT_NAME" \
            --location ${{ needs.validate.outputs.location }} \
            --template-file deploy.bicep \
            --parameters environment=${{ needs.validate.outputs.environment }} \
            --parameters suffix=${{ needs.validate.outputs.suffix }} \
            --parameters location=${{ needs.validate.outputs.location }} \
            --parameters postgresAdminUser=pgadmin \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --parameters mysqlAdminUser=mysqladmin \
            --parameters mysqlAdminPassword="${{ secrets.MYSQL_ADMIN_PASSWORD }}" \
            --parameters sqlAdminUser=sqladmin \
            --parameters sqlAdminPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
            --parameters rabbitmqUser=admin \
            --parameters rabbitmqPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --parameters jwtSecret="${{ secrets.JWT_SECRET }}" \
            --parameters jwtAlgorithm=HS256 \
            --parameters jwtIssuer=auth-service \
            --parameters jwtAudience=xshopai-platform \
            --parameters jwtExpiresIn=24h \
            --parameters adminServiceToken="${{ secrets.ADMIN_SERVICE_TOKEN }}" \
            --parameters authServiceToken="${{ secrets.AUTH_SERVICE_TOKEN }}" \
            --parameters userServiceToken="${{ secrets.USER_SERVICE_TOKEN }}" \
            --parameters cartServiceToken="${{ secrets.CART_SERVICE_TOKEN }}" \
            --parameters orderServiceToken="${{ secrets.ORDER_SERVICE_TOKEN }}" \
            --parameters productServiceToken="${{ secrets.PRODUCT_SERVICE_TOKEN }}" \
            --parameters webBffToken="${{ secrets.WEB_BFF_TOKEN }}" \
            --parameters keyVaultAdminObjectId="${{ needs.validate.outputs.object_id }}" \
            --parameters githubActionsPrincipalId="${{ needs.validate.outputs.github_actions_principal_id }}" \
            --output json

          echo "deployment_name=${DEPLOYMENT_NAME}" >> $GITHUB_OUTPUT
          echo "✓ Deployment complete"

      - name: Sync Playwright Service URL to GitHub org variable
        if: always() && steps.deploy.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_ORG_ADMIN_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ℹ GH_ORG_ADMIN_TOKEN not set — skipping org variable sync"
            echo "  Run scripts/setup-github-secrets.sh to set PLAYWRIGHT_SERVICE_URL manually"
            exit 0
          fi

          DEPLOYMENT="${{ steps.deploy.outputs.deployment_name }}"
          PW_URL=$(az deployment sub show \
            --name "$DEPLOYMENT" \
            --query "properties.outputs.playwrightServiceUrl.value" -o tsv 2>/dev/null || echo "")

          if [ -n "$PW_URL" ]; then
            gh variable set PLAYWRIGHT_SERVICE_URL \
              --org xshopai --visibility all --body "$PW_URL"
            echo "✓ PLAYWRIGHT_SERVICE_URL synced: $PW_URL"
          else
            echo "⚠ Could not extract Playwright Service URL from deployment outputs"
          fi

      - name: Generate deployment summary
        run: |
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.validate.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** ${{ needs.validate.outputs.resource_group }}" >> $GITHUB_STEP_SUMMARY
          echo "**Location:** ${{ needs.validate.outputs.location }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment:** ${{ steps.deploy.outputs.deployment_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed At:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View in Azure Portal](https://portal.azure.com/#@/resource/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${{ needs.validate.outputs.resource_group }}/overview)" >> $GITHUB_STEP_SUMMARY

      - name: Tag Azure resources with deployment metadata
        run: |
          az tag create --resource-id "/subscriptions/$(az account show --query id -o tsv)/resourceGroups/${{ needs.validate.outputs.resource_group }}" \
            --tags \
              deployed-sha="${{ github.sha }}" \
              deployed-at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
              deployed-by="github-actions" \
              deployed-workflow="${{ github.workflow }}" \
              deployed-run-id="${{ github.run_id }}" || true
          echo "✓ Resource group tagged with deployment metadata"

  # ===========================================================================
  # Job 4: Verify Deployment
  # ===========================================================================
  verify:
    name: Verify Deployment (${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    if: ${{ !inputs.what_if_only }}

    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: List deployed resources
        run: |
          echo "Verifying deployed resources..."
          az resource list \
            --resource-group ${{ needs.validate.outputs.resource_group }} \
            --output table

          RESOURCE_COUNT=$(az resource list --resource-group ${{ needs.validate.outputs.resource_group }} --query 'length(@)')
          echo "✓ ${RESOURCE_COUNT} resources deployed"

      - name: Check App Service health
        run: |
          echo "Checking App Service status..."

          for svc in admin-service admin-ui audit-service auth-service cart-service chat-service customer-ui inventory-service notification-service order-processor-service order-service payment-service product-service review-service user-service web-bff; do
            APP="app-${svc}-xshopai-${{ needs.validate.outputs.suffix }}"
            STATE=$(az webapp show --name "$APP" --resource-group ${{ needs.validate.outputs.resource_group }} --query state -o tsv 2>/dev/null || echo "NotFound")
            echo "  ${svc}: ${STATE}"
          done

      - name: Verify Key Vault
        run: |
          KV="kv-xshopai-${{ needs.validate.outputs.suffix }}"
          SECRET_COUNT=$(az keyvault secret list --vault-name "$KV" --query 'length(@)' -o tsv 2>/dev/null || echo "0")
          echo "✓ Key Vault has ${SECRET_COUNT} secrets"

      - name: Generate verification report
        run: |
          echo "## ✅ Verification Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure deployment verified." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Deploy application code via service CI/CD pipelines" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify health endpoints after code deployment" >> $GITHUB_STEP_SUMMARY
