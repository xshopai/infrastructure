      # -------------------------------------------------------------------
      # Startup commands (only 4 services need custom commands) and
      # diagnostic settings (all 16 → Log Analytics).
      # -------------------------------------------------------------------
      - name: Configure startup commands & diagnostics
        run: |
          # Startup commands for services that don't use platform defaults
          set_startup() {
            az webapp config set \
              --name "$1" --resource-group "$RESOURCE_GROUP" \
              --startup-file "$2" \
              --output none
            echo "  ✓ Startup: $1"
          }

          set_startup "app-product-service-xshopai-${ENV}-${SUFFIX}" \
            "gunicorn --worker-class uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:8080 main:app"
          set_startup "app-inventory-service-xshopai-${ENV}-${SUFFIX}" \
            "FLASK_SKIP_AZURE_MONITOR=true flask db upgrade && exec gunicorn --bind 0.0.0.0:8080 --workers 2 --timeout 120 --preload run:app"
          set_startup "app-customer-ui-xshopai-${ENV}-${SUFFIX}" \
            "pm2 serve /home/site/wwwroot/build --no-daemon --spa -p 8080"
          set_startup "app-admin-ui-xshopai-${ENV}-${SUFFIX}" \
            "pm2 serve /home/site/wwwroot/build --no-daemon --spa -p 8080"

          # Diagnostic settings — stream logs + metrics to Log Analytics
          LOG_ANALYTICS_ID=$(az monitor log-analytics workspace show \
            --workspace-name "$LOG_ANALYTICS" --resource-group "$RESOURCE_GROUP" \
            --query id -o tsv)

          ALL_SERVICES=(
            admin-service admin-ui audit-service auth-service cart-service
            chat-service customer-ui inventory-service notification-service
            order-processor-service order-service payment-service
            product-service review-service user-service web-bff
          )

          for name in "${ALL_SERVICES[@]}"; do
            app="app-${name}-xshopai-${ENV}-${SUFFIX}"
            APP_ID=$(az webapp show --name "$app" --resource-group "$RESOURCE_GROUP" --query id -o tsv)
            az monitor diagnostic-settings create \
              --name "diag-${app}" \
              --resource "$APP_ID" \
              --workspace "$LOG_ANALYTICS_ID" \
              --logs '[{"category":"AppServiceHTTPLogs","enabled":true},{"category":"AppServiceConsoleLogs","enabled":true},{"category":"AppServiceAppLogs","enabled":true},{"category":"AppServicePlatformLogs","enabled":true}]' \
              --metrics '[{"category":"AllMetrics","enabled":true}]' \
              --output none 2>/dev/null || true
            echo "  ✓ Diagnostics: $app"
          done

          echo "✓ Startup commands and diagnostics configured"

      # -------------------------------------------------------------------
      # Firewall rules — allow App Service outbound IPs to access
      # MySQL (inventory-service) and PostgreSQL (order-processor-service).
      # -------------------------------------------------------------------
      - name: Configure firewall rules
        run: |
          add_firewall_rules() {
            local db_type="$1" server="$2" app_name="$3" rule_prefix="$4"
            local outbound_ips i=0
            outbound_ips=$(az webapp show \
              --name "$app_name" --resource-group "$RESOURCE_GROUP" \
              --query possibleOutboundIpAddresses -o tsv 2>/dev/null || echo "")
            [ -z "$outbound_ips" ] && return
            for ip in $(echo "$outbound_ips" | tr ',' ' '); do
              i=$((i + 1))
              if [ "$db_type" = "mysql" ]; then
                az mysql flexible-server firewall-rule create \
                  --name "$server" --resource-group "$RESOURCE_GROUP" \
                  --rule-name "${rule_prefix}-${i}" \
                  --start-ip-address "$ip" --end-ip-address "$ip" \
                  --output none 2>/dev/null || true
              else
                az postgres flexible-server firewall-rule create \
                  --name "$server" --resource-group "$RESOURCE_GROUP" \
                  --rule-name "${rule_prefix}-${i}" \
                  --start-ip-address "$ip" --end-ip-address "$ip" \
                  --output none 2>/dev/null || true
              fi
            done
            echo "  ✓ $db_type firewall: $i rules for $app_name"
          }

          add_firewall_rules "mysql" "$MYSQL_SERVER" \
            "app-inventory-service-xshopai-${ENV}-${SUFFIX}" "inventory-outbound"
          add_firewall_rules "postgres" "$POSTGRES_SERVER" \
            "app-order-processor-service-xshopai-${ENV}-${SUFFIX}" "processor-outbound"

