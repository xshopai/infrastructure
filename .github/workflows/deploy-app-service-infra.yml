name: Deploy App Service Infrastructure

on:
  # Automatic trigger on push to main (CI)
  push:
    branches:
      - main
    paths:
      - "azure/app-service/bicep/**"
      - ".github/workflows/deploy-app-service-infra.yml"

  # Manual trigger (workflow_dispatch) - CD
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - development
          - production

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  LOCATION: swedencentral

jobs:
  deploy-infrastructure:
    name: Deploy Infrastructure to ${{ inputs.environment || 'development' }}
    runs-on: ubuntu-latest

    # Use GitHub environment for production approval
    environment:
      name: ${{ inputs.environment || (github.event_name == 'push' && 'development') || 'development' }}
      url: https://portal.azure.com/#@/resource/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/rg-xshopai-gh-${{ inputs.environment || 'development' }}

    permissions:
      id-token: write
      contents: read

    outputs:
      keyVaultName: ${{ steps.outputs.outputs.keyVaultName }}
      resourceGroupName: ${{ steps.outputs.outputs.resourceGroup }}
      acrLoginServer: ${{ steps.outputs.outputs.acrLoginServer }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log deployment info
        run: |
          echo "🚀 Deploying infrastructure to: ${{ inputs.environment || 'development' }}"
          echo "📍 Location: ${{ env.LOCATION }}"
          echo "🔄 Trigger: ${{ github.event_name }}"

      - name: Azure Login (Service Principal)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Set environment variables
        id: env
        run: |
          ENV="${{ inputs.environment || 'development' }}"
          SHORT_ENV="${ENV:0:3}"

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "shortEnv=$SHORT_ENV" >> $GITHUB_OUTPUT
          echo "resourceGroup=rg-xshopai-gh-$ENV" >> $GITHUB_OUTPUT
          echo "keyVaultName=kv-xshopai-gh-$SHORT_ENV" >> $GITHUB_OUTPUT

          echo "✅ Environment: $ENV"
          echo "✅ Resource Group: rg-xshopai-gh-$ENV"

      # ========================================================================
      # IDEMPOTENT SECRET MANAGEMENT
      # Check if secrets exist BEFORE deploying, generate only if missing
      # ========================================================================

      - name: Get or Generate Database Password
        id: dbpassword
        run: |
          echo "🔐 Checking for existing database password..."

          KV_NAME="${{ steps.env.outputs.keyVaultName }}"
          RG_NAME="${{ steps.env.outputs.resourceGroup }}"

          # Check if Key Vault and secret exist
          if az keyvault show --name "$KV_NAME" --resource-group "$RG_NAME" &> /dev/null; then
            echo "Key Vault exists, checking for db-admin-password secret..."
            
            # Try to get existing password
            EXISTING_PASSWORD=$(az keyvault secret show --vault-name "$KV_NAME" --name db-admin-password --query value -o tsv 2>/dev/null || echo "")
            
            if [ -n "$EXISTING_PASSWORD" ]; then
              echo "✅ Using existing database password from Key Vault"
              echo "password=$EXISTING_PASSWORD" >> $GITHUB_OUTPUT
              echo "isNew=false" >> $GITHUB_OUTPUT
            else
              echo "⚠️ Secret not found, generating new password..."
              # Generate password meeting SQL Server requirements: uppercase, lowercase, number, special char
              NEW_PASSWORD="Xshop$(openssl rand -base64 16 | tr -d "=+/" | cut -c1-16)@1"
              echo "password=$NEW_PASSWORD" >> $GITHUB_OUTPUT
              echo "isNew=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ Key Vault doesn't exist yet, generating new password..."
            NEW_PASSWORD="Xshop$(openssl rand -base64 16 | tr -d "=+/" | cut -c1-16)@1"
            echo "password=$NEW_PASSWORD" >> $GITHUB_OUTPUT
            echo "isNew=true" >> $GITHUB_OUTPUT
          fi

      # ========================================================================
      # DEPLOY BICEP TEMPLATE
      # ========================================================================

      - name: Deploy Bicep template
        id: deploy
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          scope: subscription
          region: ${{ env.LOCATION }}
          template: ./azure/app-service/bicep/main.bicep
          parameters: >
            environment=${{ steps.env.outputs.environment }}
            location=${{ env.LOCATION }}
            orgName=xshopai
            pipeline=gh
            dbAdminPassword=${{ steps.dbpassword.outputs.password }}
          deploymentName: "infra-${{ steps.env.outputs.environment }}-${{ github.run_number }}"
          failOnStdErr: false

      - name: Get Deployment Outputs
        id: outputs
        run: |
          echo "📊 Getting deployment outputs..."

          DEPLOYMENT_NAME="infra-${{ steps.env.outputs.environment }}-${{ github.run_number }}"

          RG_NAME=$(az deployment sub show --name $DEPLOYMENT_NAME --query properties.outputs.resourceGroupName.value -o tsv)
          ACR_NAME=$(az deployment sub show --name $DEPLOYMENT_NAME --query properties.outputs.acrName.value -o tsv)
          ACR_SERVER=$(az deployment sub show --name $DEPLOYMENT_NAME --query properties.outputs.acrLoginServer.value -o tsv)
          KV_NAME=$(az deployment sub show --name $DEPLOYMENT_NAME --query properties.outputs.keyVaultName.value -o tsv)

          echo "resourceGroup=$RG_NAME" >> $GITHUB_OUTPUT
          echo "acrName=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "acrLoginServer=$ACR_SERVER" >> $GITHUB_OUTPUT
          echo "keyVaultName=$KV_NAME" >> $GITHUB_OUTPUT

          echo "✅ Resource Group: $RG_NAME"
          echo "✅ ACR: $ACR_NAME ($ACR_SERVER)"
          echo "✅ Key Vault: $KV_NAME"

      # ========================================================================
      # STORE/UPDATE SECRETS IN KEY VAULT (Idempotent)
      # Only creates secrets if they don't exist
      # ========================================================================

      - name: Store Database Password in Key Vault
        if: steps.dbpassword.outputs.isNew == 'true'
        run: |
          echo "🔐 Storing new database password in Key Vault..."

          KV_NAME="${{ steps.outputs.outputs.keyVaultName }}"

          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name db-admin-password \
            --value "${{ steps.dbpassword.outputs.password }}" \
            --output none

          # Also store as individual database passwords (same password for simplicity)
          az keyvault secret set --vault-name "$KV_NAME" --name postgres-password --value "${{ steps.dbpassword.outputs.password }}" --output none
          az keyvault secret set --vault-name "$KV_NAME" --name mysql-password --value "${{ steps.dbpassword.outputs.password }}" --output none
          az keyvault secret set --vault-name "$KV_NAME" --name sqlserver-password --value "${{ steps.dbpassword.outputs.password }}" --output none

          echo "✅ Database passwords stored"

      - name: Generate and Store JWT Keys (if not exist)
        run: |
          echo "🔐 Checking JWT keys..."

          KV_NAME="${{ steps.outputs.outputs.keyVaultName }}"

          # Check if JWT keys already exist
          EXISTING_JWT=$(az keyvault secret show --vault-name "$KV_NAME" --name jwt-private-key --query value -o tsv 2>/dev/null || echo "")

          if [ -n "$EXISTING_JWT" ]; then
            echo "✅ JWT keys already exist in Key Vault, skipping generation"
          else
            echo "⚠️ JWT keys not found, generating new RS256 key pair..."
            
            # Generate private key
            openssl genrsa -out private.pem 2048 2>/dev/null
            
            # Generate public key
            openssl rsa -in private.pem -outform PEM -pubout -out public.pem 2>/dev/null
            
            # Store in Key Vault
            az keyvault secret set \
              --vault-name "$KV_NAME" \
              --name jwt-private-key \
              --file private.pem \
              --output none
            
            az keyvault secret set \
              --vault-name "$KV_NAME" \
              --name jwt-public-key \
              --file public.pem \
              --output none
            
            # Cleanup
            rm -f private.pem public.pem
            
            echo "✅ JWT keys generated and stored"
          fi

      - name: Generate and Store Admin Password (if not exist)
        run: |
          echo "🔐 Checking admin password..."

          KV_NAME="${{ steps.outputs.outputs.keyVaultName }}"

          EXISTING=$(az keyvault secret show --vault-name "$KV_NAME" --name admin-password --query value -o tsv 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "✅ Admin password already exists, skipping"
          else
            echo "⚠️ Admin password not found, generating..."
            ADMIN_PASSWORD=$(openssl rand -base64 32 | tr -d "=+/" | cut -c1-25)
            az keyvault secret set --vault-name "$KV_NAME" --name admin-password --value "$ADMIN_PASSWORD" --output none
            echo "✅ Admin password generated and stored"
          fi

      # ========================================================================
      # DEPLOYMENT SUMMARY
      # ========================================================================

      - name: Deployment Summary
        run: |
          echo "## 🎉 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** ${{ steps.outputs.outputs.resourceGroup }}" >> $GITHUB_STEP_SUMMARY
          echo "**Location:** ${{ env.LOCATION }}" >> $GITHUB_STEP_SUMMARY
          echo "**ACR:** ${{ steps.outputs.outputs.acrLoginServer }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔒 Idempotency Status" >> $GITHUB_STEP_SUMMARY
          echo "- Database Password: ${{ steps.dbpassword.outputs.isNew == 'true' && '🆕 Generated new' || '✅ Reused existing' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Deployed:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Azure Container Registry" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ RabbitMQ Container Instance" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Cosmos DB (MongoDB API)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ PostgreSQL Flexible Server" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ MySQL Flexible Server" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SQL Server + Databases" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Redis Cache" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Key Vault (with all secrets)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Application Insights" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Log Analytics Workspace" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ App Service Plan" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 16 App Services (with environment variables configured)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Secrets in Key Vault:" >> $GITHUB_STEP_SUMMARY
          echo "- jwt-private-key" >> $GITHUB_STEP_SUMMARY
          echo "- jwt-public-key" >> $GITHUB_STEP_SUMMARY
          echo "- admin-password" >> $GITHUB_STEP_SUMMARY
          echo "- db-admin-password" >> $GITHUB_STEP_SUMMARY
          echo "- postgres-password" >> $GITHUB_STEP_SUMMARY
          echo "- mysql-password" >> $GITHUB_STEP_SUMMARY
          echo "- sqlserver-password" >> $GITHUB_STEP_SUMMARY
          echo "- cosmos-connection-string (auto-generated by Bicep)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify resources in [Azure Portal](https://portal.azure.com/#@/resource/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ steps.outputs.outputs.resourceGroup }})" >> $GITHUB_STEP_SUMMARY
          echo "2. Deploy services using their respective workflows" >> $GITHUB_STEP_SUMMARY
          echo "3. Monitor deployments in Application Insights" >> $GITHUB_STEP_SUMMARY
