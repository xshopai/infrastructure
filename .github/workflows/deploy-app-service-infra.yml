            echo "| 1 | admin-service | NODE\|18-lts | /health/live | \`app-admin-service-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 2 | admin-ui | NODE\|18-lts | /health | \`app-admin-ui-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 3 | audit-service | NODE\|18-lts | /health/live | \`app-audit-service-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 4 | auth-service | NODE\|18-lts | /health/live | \`app-auth-service-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 5 | cart-service | JAVA\|17-java17 | /health/live | \`app-cart-service-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 6 | chat-service | NODE\|18-lts | /health/live | \`app-chat-service-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 7 | customer-ui | NODE\|18-lts | /health | \`app-customer-ui-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 8 | inventory-service | PYTHON\|3.11 | /health/live | \`app-inventory-service-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 9 | notification-service | NODE\|18-lts | /health/live | \`app-notification-service-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 10 | order-processor-service | JAVA\|17-java17 | /health/live | \`app-order-processor-service-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 11 | order-service | DOTNETCORE\|8.0 | /health/live | \`app-order-service-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 12 | payment-service | DOTNETCORE\|8.0 | /health/live | \`app-payment-service-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 13 | product-service | PYTHON\|3.11 | /health/live | \`app-product-service-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 14 | review-service | NODE\|18-lts | /health/live | \`app-review-service-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 15 | user-service | NODE\|18-lts | /health/live | \`app-user-service-xshopai-${ENV}-${SUFFIX}\` |"
            echo "| 16 | web-bff | NODE\|20-lts | /health/live | \`app-web-bff-xshopai-${ENV}-${SUFFIX}\` |"
            echo ""
            echo "All shells: managed identity ✓ Always On ✓ health checks ✓ app settings ✓ diagnostics → Log Analytics ✓"
            echo ""
            echo "### Next steps"
            echo "Trigger each service's CI workflow to deploy code to these shells."
          } >> "$GITHUB_STEP_SUMMARY"
