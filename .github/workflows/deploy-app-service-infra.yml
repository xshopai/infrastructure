name: Deploy App Service Infrastructure

on:
  # Manual trigger only — infrastructure is provisioned on demand, not on every push
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
      suffix:
        description: "Resource suffix (e.g. as01, 001) — leave blank to use org default"
        required: false
        default: ''
      location:
        description: "Azure region"
        required: false
        default: francecentral

env:
  LOCATION: ${{ inputs.location || 'francecentral' }}

jobs:
  deploy-infrastructure:
    name: Deploy infra (${{ inputs.environment }}) suffix=${{ inputs.suffix || vars.DEPLOY_SUFFIX_DEV }}
    runs-on: ubuntu-latest

    # Production requires manual approval — configure reviewers in repo Environments settings
    environment:
      name: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve suffix
        id: config
        run: |
          INPUT_SUFFIX="${{ inputs.suffix }}"
          ENV="${{ inputs.environment }}"

          if [ -n "$INPUT_SUFFIX" ]; then
            SUFFIX="$INPUT_SUFFIX"
          elif [ "$ENV" = "prod" ]; then
            SUFFIX="${{ vars.DEPLOY_SUFFIX_PROD }}"
          else
            SUFFIX="${{ vars.DEPLOY_SUFFIX_DEV }}"
          fi

          if [ -z "$SUFFIX" ]; then
            echo "❌ No suffix resolved — set DEPLOY_SUFFIX_DEV / DEPLOY_SUFFIX_PROD org variables or pass suffix input"
            exit 1
          fi

          echo "suffix=$SUFFIX"                              >> $GITHUB_OUTPUT
          echo "resourceGroup=rg-xshopai-$ENV-$SUFFIX"      >> $GITHUB_OUTPUT
          echo "keyVaultName=kv-xshopai-$ENV-$SUFFIX"       >> $GITHUB_OUTPUT

          echo "Environment : $ENV"
          echo "Suffix      : $SUFFIX"
          echo "Resource Group: rg-xshopai-$ENV-$SUFFIX"

      - name: Deploy infrastructure
        env:
          CI: "true"   # suppresses interactive prompts in deploy.sh
        run: |
          chmod +x ./azure/app-service/bash/deploy.sh
          ./azure/app-service/bash/deploy.sh \
            --infra \
            --env "${{ inputs.environment }}" \
            --suffix "${{ steps.config.outputs.suffix }}" \
            --location "${{ env.LOCATION }}"

      - name: Deployment summary
        if: always()
        run: |
          ENV="${{ inputs.environment }}"
          SUFFIX="${{ steps.config.outputs.suffix }}"
          RG="${{ steps.config.outputs.resourceGroup }}"
          KV="${{ steps.config.outputs.keyVaultName }}"
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"

          echo "## Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`$ENV\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Suffix | \`$SUFFIX\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Resource Group | \`$RG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Key Vault | \`$KV\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Location | \`${{ env.LOCATION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources provisioned by bash scripts" >> $GITHUB_STEP_SUMMARY
          echo "- Resource Group" >> $GITHUB_STEP_SUMMARY
          echo "- Log Analytics + Application Insights" >> $GITHUB_STEP_SUMMARY
          echo "- App Service Plan" >> $GITHUB_STEP_SUMMARY
          echo "- Redis Cache" >> $GITHUB_STEP_SUMMARY
          echo "- Cosmos DB" >> $GITHUB_STEP_SUMMARY
          echo "- PostgreSQL Flexible Server" >> $GITHUB_STEP_SUMMARY
          echo "- MySQL Flexible Server" >> $GITHUB_STEP_SUMMARY
          echo "- SQL Server" >> $GITHUB_STEP_SUMMARY
          echo "- RabbitMQ (ACI)" >> $GITHUB_STEP_SUMMARY
          echo "- Azure OpenAI" >> $GITHUB_STEP_SUMMARY
          echo "- Key Vault + all secrets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Set org variable \`DEPLOY_SUFFIX_DEV=$SUFFIX\` if this is your active dev environment" >> $GITHUB_STEP_SUMMARY
          echo "2. Trigger service deploy workflows — they will target this suffix automatically" >> $GITHUB_STEP_SUMMARY
          echo "3. [View in Azure Portal](https://portal.azure.com/#@/resource/subscriptions/${SUB}/resourceGroups/${RG})" >> $GITHUB_STEP_SUMMARY
